<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Asistencia Docentes</title>

<style>
body{
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

header{
    background:#198754;
    color:white;
    padding:15px;
    text-align:center;
}

.container{
    padding:20px;
}

.card{
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
    padding:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.btn{
    background:#198754;
    color:white;
}

.btn-danger{
    background:#dc3545;
    color:white;
}

input, select{
    padding:8px;
    width:100%;
    margin-top:5px;
    margin-bottom:10px;
}

table{
    width:100%;
    border-collapse: collapse;
    background:white;
}

th, td{
    border:1px solid #ddd;
    padding:8px;
    text-align:left;
}

#estado-sheet{
    margin-top:10px;
    font-weight:bold;
}

</style>
</head>

<body>

<header>
    <h2>Sistema de Asistencia Docentes</h2>
</header>

<div class="container">

<!-- ===================== DOCENTES ===================== -->
<div class="card">

<h3>Registrar Docente</h3>

<input id="dni" placeholder="DNI">
<input id="nombre" placeholder="Nombre">

<select id="turno">
    <option value="Mañana">Mañana</option>
    <option value="Tarde">Tarde</option>
</select>

<button class="btn" onclick="registrarDocente()">Guardar Docente</button>

</div>

<!-- ===================== REGISTRO ===================== -->
<div class="card">

<h3>Asistencia</h3>

<input id="scan" placeholder="DNI o QR">

<button class="btn" onclick="registrarAsistencia()">Registrar</button>

</div>

<!-- ===================== TABLA DOCENTES ===================== -->
<div class="card">

<h3>Docentes</h3>

<table>
<thead>
<tr>
<th>DNI</th>
<th>Nombre</th>
<th>Turno</th>
</tr>
</thead>
<tbody id="tablaDocentes"></tbody>
</table>

</div>

<!-- ===================== REGISTROS ===================== -->
<div class="card">

<h3>Registros</h3>

<table>
<thead>
<tr>
<th>Fecha</th>
<th>Hora</th>
<th>DNI</th>
<th>Nombre</th>
<th>Turno</th>
<th>Tipo</th>
<th>Tarde</th>
</tr>
</thead>
<tbody id="tablaRegistros"></tbody>
</table>

<div id="estado-sheet"></div>

</div>

</div>

<!-- 🔵 PARTE 2 VA AQUÍ -->


<script>

  /* ================================
   CONFIGURACIÓN GLOBAL
================================ */

const SCRIPT_URL = "https://script.google.com/macros/s/TU_ID_DEL_SCRIPT/exec";

let docentes = [];
let registros = [];

/* ================================
   HELPERS
================================ */

const $ = (id) => document.querySelector(id);

function hoy(){
    const d = new Date();
    return d.toISOString().split("T")[0];
}

function hora(){
    const d = new Date();
    return d.toTimeString().split(" ")[0];
}

/* ================================
   API GOOGLE SHEETS
================================ */

async function apiGet(action = "all") {
    try {
        const res = await fetch(`${SCRIPT_URL}?action=${action}&t=${Date.now()}`);

        if (!res.ok) throw new Error("GET error " + res.status);

        return await res.json();

    } catch (err) {
        console.error("Error GET:", err);
        return { docentes: [], registros: [] };
    }
}

async function apiPost(data) {
    try {
        const res = await fetch(SCRIPT_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        return await res.json();

    } catch (err) {
        console.error("Error POST:", err);
        return { ok: false, mensaje: "Error de conexión" };
    }
}

/* ================================
   SINCRONIZACIÓN GENERAL
================================ */

async function loadAll() {

    try {

        const data = await apiGet("all");

        docentes = data.docentes || [];
        registros = data.registros || [];

        renderDocentes();
        renderRegistros();

        console.log("Sincronizado OK");

    } catch (e) {

        console.error(e);

    }
}



function renderDocentes(){

    const tbody = $("#tablaDocentes");

    if(!tbody) return;

    tbody.innerHTML = "";

    docentes.forEach(d => {

        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${d.dni}</td>
            <td>${d.nombre}</td>
            <td>${d.turno}</td>
        `;

        tbody.appendChild(tr);

    });

}


function renderRegistros(){

    const tbody = $("#tablaRegistros");

    if(!tbody) return;

    tbody.innerHTML = "";

    registros.slice().reverse().forEach(r => {

        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${r.fecha}</td>
            <td>${r.hora}</td>
            <td>${r.docenteId}</td>
            <td>${r.nombre}</td>
            <td>${r.turno}</td>
            <td>${r.tipo}</td>
            <td>${r.tarde ? "SI" : "NO"}</td>
        `;

        tbody.appendChild(tr);

    });

}


async function registrarDocente(){

    const dni = $("#dni").value.trim();
    const nombre = $("#nombre").value.trim();
    const turno = $("#turno").value;

    if(!dni || !nombre){
        alert("Completa los datos");
        return;
    }

    const res = await apiPost({
        kind: "docente",
        dni,
        nombre,
        turno
    });

    if(!res.ok){
        alert(res.mensaje || "Error");
        return;
    }

    $("#dni").value = "";
    $("#nombre").value = "";

    await loadAll();

}


async function registrarAsistencia(){

    const dni = $("#scan").value.trim();

    if(!dni){
        alert("Ingrese DNI");
        return;
    }

    const doc = docentes.find(d => d.dni === dni);

    if(!doc){
        alert("Docente no encontrado");
        return;
    }

    const ahora = new Date();

    const fecha = ahora.toISOString().split("T")[0];
    const horaStr = ahora.toTimeString().split(" ")[0];

    const esTarde = horaStr > "08:00";

    const registro = {
        fecha,
        hora: horaStr,
        docenteId: dni,
        nombre: doc.nombre,
        turno: doc.turno,
        tipo: "entrada",
        tarde: esTarde
    };

    const res = await apiPost({
        kind: "registro",
        ...registro
    });

    if(!res.ok){
        alert(res.mensaje || "Error registro");
        return;
    }

    $("#scan").value = "";

    await loadAll();

}



document.addEventListener("DOMContentLoaded", () => {

    loadAll();

    // sincronización automática cada 15 segundos
    setInterval(loadAll, 15000);

});


function yaRegistradoHoy(dni){

    const hoyStr = hoy();

    return registros.some(r =>
        r.docenteId === dni &&
        r.fecha === hoyStr
    );

}
